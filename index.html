<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>UrbanFresh</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0e0e0e;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:black;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:28px;
font-weight:bold;
color:#00ffae;
}

nav a{
margin:0 15px;
text-decoration:none;
color:white;
}

.hero{
height:60vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(120deg,#000,#222);
}

.hero h1{
font-size:50px;
}

.hero p{
color:#aaa;
}

button{
padding:10px 20px;
background:#00ffae;
border:none;
cursor:pointer;
font-weight:bold;
}

.productos{
padding:50px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
margin-top:40px;
}

.card{
background:#1b1b1b;
padding:20px;
border-radius:10px;
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
border-radius:10px;
}

.precio{
color:#00ffae;
font-size:20px;
}

footer{
background:black;
text-align:center;
padding:20px;
margin-top:40px;
color:#aaa;
}

.cart-icon{
cursor:pointer;
font-size:20px;
}

.badge{
background:red;
padding:3px 7px;
border-radius:50%;
font-size:12px;
}

.cart{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:#111;
padding:20px;
transition:.4s;
overflow:auto;
}

.cart.active{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
background:#1a1a1a;
padding:10px;
border-radius:5px;
}

.remove{
color:red;
cursor:pointer;
}

.total{
margin-top:20px;
font-size:22px;
color:#00ffae;
}

.whatsapp{
margin-top:20px;
background:#25D366;
width:100%;
}

</style>
</head>

<body>

<header>

<div class="logo">UrbanFresh</div>

<nav>
<a href="#">Inicio</a>
<a href="#">Colección</a>
<a href="#">Contacto</a>
</nav>

<div class="cart-icon" onclick="toggleCart()">
🛒 <span class="badge" id="count">0</span>
</div>

</header>

<section class="hero">

<div>
<h1>UrbanFresh</h1>
<p>Streetwear moderno para tu estilo</p>
<button onclick="document.querySelector('.productos').scrollIntoView()">Ver colección</button>
</div>

</section>

<section class="productos">

<h2>Nuestra Colección</h2>

<div class="grid">

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Hoodie Urban</h3>
<p class="precio">$40</p>
<button onclick="addToCart('Hoodie Urban',40)">Agregar</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Camiseta Fresh</h3>
<p class="precio">$25</p>
<button onclick="addToCart('Camiseta Fresh',25)">Agregar</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Gorra Street</h3>
<p class="precio">$20</p>
<button onclick="addToCart('Gorra Street',20)">Agregar</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Pantalón Urban</h3>
<p class="precio">$50</p>
<button onclick="addToCart('Pantalón Urban',50)">Agregar</button>
</div>

</div>

</section>

<footer>
© 2026 UrbanFresh Streetwear
</footer>

<div class="cart" id="cart">

<h2>Tu carrito</h2>

<div id="items"></div>

<div class="total">
Total: $<span id="total">0</span>
</div>

<button class="whatsapp" onclick="comprarWhatsApp()">
Comprar por WhatsApp
</button>

</div>

<script>

let carrito=[]
let total=0

function toggleCart(){
document.getElementById("cart").classList.toggle("active")
}

function addToCart(nombre,precio){

carrito.push({nombre,precio})

total+=precio

updateCart()

document.getElementById("cart").classList.add("active")

}

function removeItem(index){

total-=carrito[index].precio

carrito.splice(index,1)

updateCart()

}

function updateCart(){

let items=document.getElementById("items")

items.innerHTML=""

carrito.forEach((item,index)=>{

items.innerHTML+=`
<div class="cart-item">
<span>${item.nombre} - $${item.precio}</span>
<span class="remove" onclick="removeItem(${index})">✖</span>
</div>
`

})

document.getElementById("total").innerText=total
document.getElementById("count").innerText=carrito.length

}

function comprarWhatsApp(){

let mensaje="Hola quiero comprar:%0A"

carrito.forEach(item=>{
mensaje+=`- ${item.nombre} $${item.precio}%0A`
})

mensaje+=`Total: $${total}`

window.open(`https://wa.me/TUNUMERO?text=${mensaje}`)

}

</script>

</body>
</html>
